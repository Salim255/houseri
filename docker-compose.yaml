# ============================================================
#  DOCKER COMPOSE — HOUSERI (Client + Server Deployment)
#  ------------------------------------------------------------
#  This file defines how the Houseri application runs in Docker.
#  It includes:
#    - Backend API service (houseri-server)
#    - Frontend client service (houseri-client)
#    - Shared network for internal communication
#    - Automatic rebuild support for Jenkins
# ============================================================

version: "3.9"  
# Why important:
# - Version 3.9 is the latest stable Compose spec.
# - Works with modern Docker and supports all features you need.

name: housori-app
# Why important:
# - Sets a project name for your containers and network.
# - Makes it easier to manage multiple projects on the same host.
services:

  # ------------------------------------------------------------
  # HOUSERI BACKEND SERVICE
  # ------------------------------------------------------------
  housori-server:

    image: crawan/housori-server:latest
    # Why important:
    # - Jenkins tags the backend image with this name.
    # - Compose will use the image built by Jenkins.
    # - Ensures consistency between CI and runtime.

    env_file:
      - ./server/.env
    # Why important:
    # - Keeps secrets and config OUT of the image.
    # - Jenkins writes .env before deployment.
    # - Clean separation between build and runtime.

    ports:
      - "3001:3000"
    # Why important:
    # - Exposes backend API to the host.
    # - Left side = host port, right side = container port.
    # - Change if your backend uses another port.

    restart: always
    # Why important:
    # - Auto-restarts if the backend crashes.
    # - Essential for production reliability.

    networks:
      - housori-network
    # Why important:
    # - Allows backend to communicate with frontend internally.
    # - No need to expose internal ports to the internet.


  # ------------------------------------------------------------
  # HOUSERI FRONTEND SERVICE
  # ------------------------------------------------------------
  housori-client:
    image: crawan/housori-client:latest
    # Why important:
    # - Matches the image name Jenkins builds.
    # - Ensures consistency between CI and runtime.

    #env_file:
      #- ./client/.env
    # Why important:
    # - Frontend config (API URL, environment mode, etc.)
    # - Jenkins writes this file before deployment.

    ports:
      - "3002:80"
    # Why important:
    # - Exposes the frontend to the host.
    # - Change if your frontend uses another port.

    restart: always
    # Why important:
    # - Auto-restart on crash.
    # - Essential for production.

    networks:
      - housori-network
    # Why important:
    # - Allows frontend to call backend using:
    #       http://houseri-server:5000
    # - No need to expose backend publicly.


# ------------------------------------------------------------
# SHARED NETWORK
# ------------------------------------------------------------
networks:
  housori-network:
    driver: bridge
    # Why important:
    # - Creates an isolated internal network.
    # - Frontend and backend communicate securely.
    # - Prevents external access to internal services.
